name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-runtime.txt
      - name: Install audit tools
        run: python -m pip install pip-audit bandit
      - name: Repository privacy and secret guard
        shell: pwsh
        run: .\powershell\audit_repository_security.ps1
      - name: HTTP server regression tests
        run: python -m unittest discover -s tests -v
      - name: Dependency audit
        run: python -m pip_audit -r requirements-runtime.txt
      - name: Active Python security scan
        run: python -m bandit -r python
